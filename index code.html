<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Úkoly</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }

  .top-bar { background: white; border-bottom: 1px solid #e8e8e4; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .top-bar h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .user-switcher { display: flex; gap: 6px; }
  .user-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .user-btn.radek { background: #dbeafe; color: #1e40af; }
  .user-btn.vasek { background: #dcfce7; color: #166534; }
  .user-btn.karel { background: #fef3c7; color: #92400e; }
  .user-btn.active { border-color: #374151; transform: scale(1.1); }

  .tabs { display: flex; gap: 0; background: white; border-bottom: 1px solid #e8e8e4; padding: 0 16px; overflow-x: auto; }
  .tab { padding: 12px 14px; font-size: 13px; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

  .content { padding: 16px; max-width: 600px; margin: 0 auto; }

  .add-form { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 14px; margin-bottom: 20px; }
  .add-form textarea { width: 100%; border: none; outline: none; font-size: 14px; color: #1a1a1a; resize: none; font-family: inherit; line-height: 1.5; min-height: 44px; }
  .add-form textarea::placeholder { color: #9ca3af; }
  .add-form-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; flex-wrap: wrap; }
  .kat-select { font-size: 13px; border: 1px solid #e8e8e4; border-radius: 8px; padding: 6px 10px; color: #374151; background: #f9f9f7; outline: none; font-family: inherit; }
  .add-btn { background: #1a1a1a; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.8; }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .section { margin-bottom: 20px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #9ca3af; }
  .section-count { font-size: 11px; background: #f0f0ec; color: #6b7280; padding: 1px 7px; border-radius: 999px; font-weight: 500; }

  .task-card { background: white; border: 1px solid #e8e8e4; border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; transition: opacity 0.2s; }
  .task-card.done { opacity: 0.5; }
  .cb { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #d1d5db; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .cb:hover { border-color: #6b7280; }
  .cb.checked { background: #16a34a; border-color: #16a34a; }
  .cb.checked::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }
  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; color: #1a1a1a; line-height: 1.5; word-break: break-word; }
  .task-card.done .task-text { text-decoration: line-through; color: #9ca3af; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .av { width: 16px; height: 16px; border-radius: 50%; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .av.radek { background: #dbeafe; color: #1e40af; }
  .av.vasek { background: #dcfce7; color: #166534; }
  .av.karel { background: #fef3c7; color: #92400e; }
  .task-author { font-size: 12px; color: #9ca3af; }
  .task-date { font-size: 12px; color: #c4c4bc; margin-left: auto; }
  .del-btn { opacity: 0; background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 16px; padding: 0 2px; flex-shrink: 0; transition: opacity 0.15s, color 0.15s; line-height: 1; }
  .task-card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #ef4444; }

  .empty { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }

  .kat-badge { font-size: 11px; padding: 1px 7px; border-radius: 999px; font-weight: 500; }
  .kat-badge.aktualni { background: #fff7ed; color: #c2410c; }
  .kat-badge.dulezite { background: #fef2f2; color: #b91c1c; }
  .kat-badge.dlouhodoby { background: #eff6ff; color: #1d4ed8; }

  @media (max-width: 480px) {
    .top-bar h1 { font-size: 16px; }
    .content { padding: 12px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Úkoly</h1>
  <div class="user-switcher">
    <button class="user-btn radek active" onclick="setUser('radek')" title="Radek">R</button>
    <button class="user-btn vasek" onclick="setUser('vasek')" title="Vašek">V</button>
    <button class="user-btn karel" onclick="setUser('karel')" title="Karel">K</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setTab('vse')">Vše</div>
  <div class="tab" onclick="setTab('aktualni')">Aktuální</div>
  <div class="tab" onclick="setTab('dulezite')">Důležité</div>
  <div class="tab" onclick="setTab('dlouhodoby')">Dlouhodobé</div>
</div>

<div class="content">
  <div class="add-form">
    <textarea id="newTask" placeholder="Přidat nový úkol..." rows="2" onkeydown="handleKey(event)"></textarea>
    <div class="add-form-footer">
      <select class="kat-select" id="newKat">
        <option value="aktualni">Aktuální</option>
        <option value="dulezite">Důležité</option>
        <option value="dlouhodoby">Dlouhodobé</option>
      </select>
      <button class="add-btn" id="addBtn" onclick="addTask()">+ Přidat</button>
    </div>
  </div>
  <div id="taskList"><div class="loading">Načítám úkoly...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://rcnwldvkhwcygetpeccd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NDI_ONvoikguaj7fTfdn_w_8G51cWrK';

let currentUser = localStorage.getItem('ukoly_user') || 'radek';
let currentTab = 'vse';
let tasks = [];

function setUser(u) {
  currentUser = u;
  localStorage.setItem('ukoly_user', u);
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.user-btn.' + u).classList.add('active');
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab')[['vse','aktualni','dulezite','dlouhodoby'].indexOf(t)].classList.add('active');
  render();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(); }
}

async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

async function loadTasks() {
  try {
    tasks = await api('GET', 'ukoly?order=created_at.desc');
    render();
  } catch(e) {
    document.getElementById('taskList').innerHTML = '<div class="empty">Chyba při načítání: ' + e.message + '</div>';
  }
}

async function addTask() {
  const text = document.getElementById('newTask').value.trim();
  if (!text) return;
  const kat = document.getElementById('newKat').value;
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  try {
    const [newTask] = await api('POST', 'ukoly', { text, kategorie: kat, autor: currentUser });
    tasks.unshift(newTask);
    document.getElementById('newTask').value = '';
    render();
  } catch(e) { alert('Chyba: ' + e.message); }
  btn.disabled = false;
}

async function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.hotovo = !t.hotovo;
  render();
  try {
    await api('PATCH', 'ukoly?id=eq.' + id, { hotovo: t.hotovo });
  } catch(e) { t.hotovo = !t.hotovo; render(); }
}

async function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  render();
  try {
    await api('DELETE', 'ukoly?id=eq.' + id);
  } catch(e) { loadTasks(); }
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'dnes';
  if (diff === 1) return 'včera';
  if (diff < 7) return diff + ' dny';
  return d.getDate() + '. ' + (d.getMonth()+1) + '.';
}

function authorLabel(a) {
  if (a === 'radek') return 'Radek';
  if (a === 'vasek') return 'Vašek';
  return 'Karel';
}

const katLabels = { aktualni: 'Aktuální', dulezite: 'Důležité', dlouhodoby: 'Dlouhodobé' };

function render() {
  const filtered = currentTab === 'vse' ? tasks : tasks.filter(t => t.kategorie === currentTab);
  const active = filtered.filter(t => !t.hotovo);
  const done = filtered.filter(t => t.hotovo);

  if (filtered.length === 0) {
    document.getElementById('taskList').innerHTML = '<div class="empty">Žádné úkoly</div>';
    return;
  }

  let html = '';

  if (currentTab === 'vse') {
    const kats = ['aktualni', 'dulezite', 'dlouhodoby'];
    for (const k of kats) {
      const items = active.filter(t => t.kategorie === k);
      if (!items.length) continue;
      html += section(katLabels[k], items, false);
    }
    if (done.length) html += section('Hotovo', done, true);
  } else {
    if (active.length) html += renderCards(active, false);
    if (done.length) {
      html += '<div class="section"><div class="section-header"><span class="section-title">Hotovo</span><span class="section-count">' + done.length + '</span></div>';
      html += renderCards(done, true) + '</div>';
    }
  }

  document.getElementById('taskList').innerHTML = html;
}

function section(label, items, isDone) {
  return '<div class="section"><div class="section-header"><span class="section-title">' + label + '</span><span class="section-count">' + items.length + '</span></div>' + renderCards(items, isDone) + '</div>';
}

function renderCards(items, isDone) {
  return items.map(t => `
    <div class="task-card ${t.hotovo ? 'done' : ''}">
      <div class="cb ${t.hotovo ? 'checked' : ''}" onclick="toggleDone(${t.id})"></div>
      <div class="task-body">
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-meta">
          <div class="av ${t.autor}">${authorLabel(t.autor)[0]}</div>
          <span class="task-author">${authorLabel(t.autor)}</span>
          ${currentTab === 'vse' && !t.hotovo ? '' : ''}
          <span class="task-date">${formatDate(t.created_at)}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask(${t.id})" title="Smazat">×</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
setUser(currentUser);
loadTasks();
setInterval(loadTasks, 30000);
</script>
</body>
</html>
