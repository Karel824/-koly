<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Úkoly</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }

/* LOGIN */
#loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; background: #f5f5f0; }
.login-title { font-size: 32px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; letter-spacing: -0.5px; }
.login-sub { font-size: 15px; color: #9ca3af; margin-bottom: 48px; }
.login-users { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 320px; }
.login-user-btn { display: flex; align-items: center; gap: 18px; padding: 20px 24px; border-radius: 24px; border: none; cursor: pointer; font-family: inherit; transition: transform 0.15s; box-shadow: 0 2px 12px rgba(0,0,0,0.10); }
.login-user-btn:active { transform: scale(0.97); }
.login-user-btn.radek { background: #2563eb; }
.login-user-btn.vasek { background: #16a34a; }
.login-user-btn.karel { background: #d97706; }
.login-av { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: white; flex-shrink: 0; }
.login-name { font-size: 20px; font-weight: 600; color: white; }

/* APP */
#app { display: none; }
.top-bar { background: white; border-bottom: 1px solid #e8e8e4; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.top-bar h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
.top-bar-user { display: flex; align-items: center; gap: 10px; }
.tba { width: 38px; height: 38px; border-radius: 50%; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tba.radek { background: #dbeafe; color: #1e40af; }
.tba.vasek { background: #dcfce7; color: #166534; }
.tba.karel { background: #fef3c7; color: #92400e; }
.tbu-name { font-size: 15px; color: #374151; font-weight: 600; }
.switch-btn { font-size: 13px; color: #9ca3af; background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; display: block; padding: 0; }

.tabs { display: flex; justify-content: center; background: white; border-bottom: 1px solid #e8e8e4; padding: 0 8px; }
.tab { padding: 14px 18px; font-size: 15px; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; gap: 7px; flex: 1; justify-content: center; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
.tab-count { font-size: 12px; background: #f0f0ec; color: #6b7280; padding: 2px 7px; border-radius: 999px; font-weight: 600; }
.tab.active .tab-count { background: #1a1a1a; color: white; }

.content { padding: 16px; max-width: 600px; margin: 0 auto; }

/* ADD FORM - TASKS */
.add-form { background: white; border-radius: 14px; border: 1px solid #e8e8e4; padding: 14px; margin-bottom: 20px; }
.add-form textarea { width: 100%; border: none; outline: none; font-size: 14px; color: #1a1a1a; resize: none; font-family: inherit; line-height: 1.5; min-height: 48px; background: transparent; }
.add-form textarea::placeholder { color: #9ca3af; }
.form-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.pro-label { font-size: 13px; font-weight: 500; color: #6b7280; white-space: nowrap; }
.ab { padding: 7px 14px; border-radius: 999px; border: 1.5px solid transparent; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; opacity: 0.4; min-height: 36px; }
.ab.radek { background: #dbeafe; color: #1e40af; }
.ab.vasek { background: #dcfce7; color: #166534; }
.ab.karel { background: #fef3c7; color: #92400e; }
.ab.sel { opacity: 1; border-color: currentColor; }
.date-btn { display: flex; align-items: center; gap: 5px; padding: 8px 12px; border-radius: 10px; border: 1px solid #e8e8e4; background: #f9f9f7; font-size: 13px; color: #6b7280; cursor: pointer; font-family: inherit; white-space: nowrap; min-height: 40px; }
.date-btn.has-date { color: #374151; border-color: #d1d5db; background: white; }
#dateInput { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
.urgent-btn { display: flex; align-items: center; gap: 5px; padding: 8px 12px; border-radius: 10px; border: 1px solid #e8e8e4; background: #f9f9f7; font-size: 13px; color: #6b7280; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s; min-height: 40px; }
.urgent-btn.on { background: #fef2f2; border-color: #fca5a5; color: #dc2626; font-weight: 600; }
.add-btn { background: #1a1a1a; color: white; border: none; border-radius: 12px; padding: 10px 22px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: transform 0.12s, background 0.2s; margin-left: auto; min-height: 42px; }
.add-btn:active { transform: scale(0.95); }
.add-btn.ok { background: #16a34a; }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ADD FORM - REMINDERS */
.rem-form { background: white; border-radius: 14px; border: 1px solid #e8e8e4; padding: 14px; margin-bottom: 20px; }
.rem-form input[type="text"] { width: 100%; border: none; outline: none; font-size: 14px; color: #1a1a1a; font-family: inherit; line-height: 1.5; padding: 6px 0; background: transparent; }
.rem-form input[type="text"]::placeholder { color: #9ca3af; }
.rem-form-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.inp-date { padding: 6px 10px; border-radius: 8px; border: 1px solid #e8e8e4; background: #f9f9f7; font-size: 13px; color: #374151; font-family: inherit; outline: none; }
.inp-time { padding: 6px 10px; border-radius: 8px; border: 1px solid #e8e8e4; background: #f9f9f7; font-size: 13px; color: #374151; font-family: inherit; outline: none; width: 110px; }

/* ADD FORM - HONORAR */
.hon-form { background: white; border-radius: 14px; border: 1px solid #e8e8e4; padding: 14px; margin-bottom: 20px; }
.hon-form input[type="text"] { width: 100%; border: none; outline: none; font-size: 14px; color: #1a1a1a; font-family: inherit; line-height: 1.5; padding: 6px 0; background: transparent; }
.hon-form input[type="text"]::placeholder { color: #9ca3af; }
.hon-form-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.inp-hours { padding: 6px 10px; border-radius: 8px; border: 1px solid #e8e8e4; background: #f9f9f7; font-size: 13px; color: #374151; font-family: inherit; outline: none; width: 90px; }

/* TASK CARDS */
.sec-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; margin-top: 4px; }
.sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #9ca3af; }
.sec-count { font-size: 11px; background: #f0f0ec; color: #6b7280; padding: 1px 7px; border-radius: 999px; }
.card { background: white; border: 1.5px solid #e8e8e4; border-radius: 14px; padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
.card.done { opacity: 0.45; }
.card.urgent { background: #fff5f5; border-color: #fca5a5; }
.cb { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.15s; position: relative; }
.cb:hover { border-color: #6b7280; }
.cb.chk { background: #16a34a; border-color: #16a34a; }
.cb.chk::after { content:''; position:absolute; left:7px; top:3px; width:7px; height:12px; border:2.5px solid white; border-top:none; border-left:none; transform:rotate(45deg); }
.card-body { flex: 1; min-width: 0; }
.card-text { font-size: 14px; color: #1a1a1a; line-height: 1.5; word-break: break-word; }
.card.done .card-text { text-decoration: line-through; color: #9ca3af; }
.card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 8px; }
.card-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.due-tag { font-size: 11px; color: #6b7280; background: #f5f5f0; padding: 2px 8px; border-radius: 6px; }
.due-tag.late { color: #dc2626; background: #fef2f2; font-weight: 600; }
.urg-tag { font-size: 11px; color: #dc2626; background: #fef2f2; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
.pro-badge { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.pro-badge.radek { background: #dbeafe; color: #1e40af; }
.pro-badge.vasek { background: #dcfce7; color: #166534; }
.pro-badge.karel { background: #fef3c7; color: #92400e; }
.pro-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pro-badge.radek .pro-dot { background: #2563eb; }
.pro-badge.vasek .pro-dot { background: #16a34a; }
.pro-badge.karel .pro-dot { background: #d97706; }

/* REMINDER CARDS */
.rem-card { background: white; border: 1.5px solid #e8e8e4; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
.rem-card.past { background: #fafafa; }
.rem-date-block { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 48px; background: #f0f0ec; border-radius: 10px; padding: 6px 10px; flex-shrink: 0; }
.rem-card.past .rem-date-block { background: #f5f5f0; }
.rem-day { font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.rem-month { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.rem-body { flex: 1; min-width: 0; }
.rem-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.rem-card.past .rem-title { color: #9ca3af; }
.rem-time-tag { font-size: 12px; color: #6b7280; margin-top: 3px; }
.rem-past-tag { font-size: 11px; color: #9ca3af; background: #f0f0ec; padding: 2px 8px; border-radius: 6px; margin-top: 4px; display: inline-block; }

/* HONORAR CARDS */
.hon-card { border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; border: 1.5px solid; transition: all 0.2s; }
.hon-card.neproplaceno { background: #fef2f2; border-color: #fca5a5; }
.hon-card.proplaceno { background: #f0fdf4; border-color: #86efac; }

.hon-status-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 12px; border: none; cursor: pointer; flex-shrink: 0; transition: all 0.15s; font-family: inherit; }
.hon-card.neproplaceno .hon-status-btn { background: #fca5a5; }
.hon-card.proplaceno .hon-status-btn { background: #86efac; }
.hon-status-icon { font-size: 20px; line-height: 1; }
.hon-status-label { font-size: 9px; font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.hon-card.neproplaceno .hon-status-label { color: #991b1b; }
.hon-card.proplaceno .hon-status-label { color: #166534; }

.hon-body { flex: 1; min-width: 0; }
.hon-title { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.4; word-break: break-word; }
.hon-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.hon-who { font-size: 12px; font-weight: 600; }
.hon-who.vasek { color: #166534; }
.hon-who.karel { color: #92400e; }
.hon-who.radek { color: #1e40af; }
.hon-date { font-size: 12px; color: #9ca3af; }
.hon-hours { font-size: 13px; font-weight: 700; color: #374151; background: white; border-radius: 8px; padding: 3px 10px; border: 1px solid #e8e8e4; white-space: nowrap; }

/* SUMMARY BAR */
.hon-summary { background: white; border-radius: 12px; border: 1px solid #e8e8e4; padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
.hon-sum-item { display: flex; flex-direction: column; gap: 2px; }
.hon-sum-label { font-size: 11px; color: #9ca3af; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.hon-sum-val { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.hon-sum-val.red { color: #dc2626; }
.hon-sum-val.green { color: #16a34a; }
.hon-sum-sep { width: 1px; background: #e8e8e4; align-self: stretch; }

/* ACTION BUTTONS */
.card-actions { display: flex; gap: 6px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
.card:hover .card-actions, .rem-card:hover .card-actions, .hon-card:hover .card-actions { opacity: 1; }
.action-btn { background: none; border: 1px solid #e8e8e4; border-radius: 9px; color: #9ca3af; cursor: pointer; font-size: 16px; padding: 6px 10px; line-height: 1; transition: all 0.15s; font-family: inherit; min-width: 38px; min-height: 38px; display: flex; align-items: center; justify-content: center; }
.action-btn:hover { border-color: #d1d5db; color: #374151; background: #f9f9f7; }
.action-btn.del:hover { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }
@media (max-width: 480px) { .content { padding: 12px; } .card-actions { opacity: 1; } }

/* MODALS */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 18px; padding: 20px; width: 100%; max-width: 440px; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #1a1a1a; }
.modal textarea, .modal input[type="text"] { width: 100%; border: 1px solid #e8e8e4; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: none; outline: none; color: #1a1a1a; line-height: 1.5; }
.modal textarea:focus, .modal input[type="text"]:focus { border-color: #9ca3af; }
.modal-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-cancel { background: #f5f5f0; color: #6b7280; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-save { background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-save:hover { opacity: 0.85; }

/* CONFIRM */
.confirm-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.confirm-bg.open { display: flex; }
.confirm { background: white; border-radius: 18px; padding: 22px 20px; width: 100%; max-width: 320px; text-align: center; }
.confirm p { font-size: 15px; color: #374151; margin-bottom: 18px; line-height: 1.5; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }
.btn-keep { background: #f5f5f0; color: #6b7280; border: none; border-radius: 10px; padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-del { background: #dc2626; color: white; border: none; border-radius: 10px; padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-del:hover { opacity: 0.85; }

#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.empty { text-align: center; padding: 40px 20px; color: #c4c4bc; font-size: 14px; }
.loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-title">Úkoly</div>
  <div class="login-sub">Kdo jsi?</div>
  <div class="login-users">
    <button class="login-user-btn radek" onclick="loginAs('radek')"><div class="login-av">R</div><div class="login-name">Radek</div></button>
    <button class="login-user-btn vasek" onclick="loginAs('vasek')"><div class="login-av">V</div><div class="login-name">Vašek</div></button>
    <button class="login-user-btn karel" onclick="loginAs('karel')"><div class="login-av">K</div><div class="login-name">Karel</div></button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <h1 id="tbTitle">Úkoly</h1>
    <div class="top-bar-user">
      <div class="tba" id="tbAv"></div>
      <div><div class="tbu-name" id="tbName"></div><button class="switch-btn" onclick="switchUser()">změnit</button></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('ukoly')">Úkoly <span class="tab-count" id="cnt-ukoly">0</span></div>
    <div class="tab" onclick="setTab('pripominky')">Připomínky <span class="tab-count" id="cnt-pripominky">0</span></div>
    <div class="tab" onclick="setTab('honorar')">Honorář <span class="tab-count" id="cnt-honorar">0</span></div>
  </div>

  <div class="content">

    <!-- TASK FORM -->
    <div id="taskForm">
      <div class="add-form">
        <textarea id="newTask" placeholder="Nový úkol..." rows="2" onkeydown="handleKey(event)"></textarea>
        <div class="form-row">
          <span class="pro-label">Úkol pro:</span>
          <button class="ab radek sel" id="ab-radek" onclick="setAssignee('radek')">Radek</button>
          <button class="ab vasek" id="ab-vasek" onclick="setAssignee('vasek')">Vašek</button>
          <button class="ab karel" id="ab-karel" onclick="setAssignee('karel')">Karel</button>
        </div>
        <div class="form-row">
          <button class="date-btn" id="dateBtnShow" onclick="openDate()">📅 <span id="dateLabel">Datum splnění</span></button>
          <input type="date" id="dateInput" onchange="onDateChange(this.value)">
          <button class="urgent-btn" id="urgentBtn" onclick="toggleUrgent()">🔴 <span id="urgentLabel">Urgentní</span></button>
          <button class="add-btn" id="addBtn" onclick="addTask()">+ Přidat</button>
        </div>
      </div>
    </div>

    <!-- REMINDER FORM -->
    <div id="remForm" style="display:none">
      <div class="rem-form">
        <input type="text" id="newRem" placeholder="Název připomínky..." onkeydown="handleRemKey(event)">
        <div class="rem-form-row">
          <input type="date" class="inp-date" id="remDate">
          <input type="time" class="inp-time" id="remTime" placeholder="Čas">
          <button class="add-btn" id="addRemBtn" onclick="addReminder()">+ Přidat</button>
        </div>
      </div>
    </div>

    <!-- HONORAR FORM -->
    <div id="honForm" style="display:none">
      <div class="hon-form">
        <input type="text" id="newHonDesc" placeholder="Popis práce..." onkeydown="handleHonKey(event)">
        <div class="hon-form-row">
          <span class="pro-label">Kdo:</span>
          <button class="ab vasek" id="hab-vasek" onclick="setHonWho('vasek')">Vašek</button>
          <button class="ab karel sel" id="hab-karel" onclick="setHonWho('karel')">Karel</button>
        </div>
        <div class="hon-form-row">
          <input type="date" class="inp-date" id="honDate">
          <input type="number" class="inp-hours" id="honHours" placeholder="Hodiny" min="0.5" step="0.5">
          <button class="add-btn" id="addHonBtn" onclick="addHonorar()">+ Přidat</button>
        </div>
      </div>
    </div>

    <div id="taskList"><div class="loading">Načítám...</div></div>
  </div>
</div>

<!-- EDIT TASK MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>Upravit úkol</h3>
    <textarea id="editText" rows="3"></textarea>
    <div class="modal-row">
      <span class="pro-label">Pro:</span>
      <button class="ab radek" id="eab-radek" onclick="setEditAssignee('radek')">Radek</button>
      <button class="ab vasek" id="eab-vasek" onclick="setEditAssignee('vasek')">Vašek</button>
      <button class="ab karel" id="eab-karel" onclick="setEditAssignee('karel')">Karel</button>
    </div>
    <div class="modal-row">
      <button class="date-btn" id="editDateBtn" onclick="openEditDate()">📅 <span id="editDateLabel">Datum splnění</span></button>
      <input type="date" id="editDateInput" onchange="onEditDateChange(this.value)">
      <button class="urgent-btn" id="editUrgentBtn" onclick="toggleEditUrgent()">🔴 <span id="editUrgentLabel">Urgentní</span></button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Zrušit</button>
      <button class="btn-save" onclick="saveEdit()">Uložit</button>
    </div>
  </div>
</div>

<!-- EDIT REMINDER MODAL -->
<div class="modal-bg" id="editRemModal">
  <div class="modal">
    <h3>Upravit připomínku</h3>
    <input type="text" id="editRemText">
    <div class="modal-row">
      <input type="date" class="inp-date" id="editRemDate">
      <input type="time" class="inp-time" id="editRemTime">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditRem()">Zrušit</button>
      <button class="btn-save" onclick="saveEditRem()">Uložit</button>
    </div>
  </div>
</div>

<!-- EDIT HONORAR MODAL -->
<div class="modal-bg" id="editHonModal">
  <div class="modal">
    <h3>Upravit honorář</h3>
    <input type="text" id="editHonText">
    <div class="modal-row">
      <span class="pro-label">Kdo:</span>
      <button class="ab vasek" id="ehab-vasek" onclick="setEditHonWho('vasek')">Vašek</button>
      <button class="ab karel" id="ehab-karel" onclick="setEditHonWho('karel')">Karel</button>
    </div>
    <div class="modal-row">
      <input type="date" class="inp-date" id="editHonDate">
      <input type="number" class="inp-hours" id="editHonHours" min="0.5" step="0.5">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditHon()">Zrušit</button>
      <button class="btn-save" onclick="saveEditHon()">Uložit</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-bg" id="confirmModal">
  <div class="confirm">
    <p>Opravdu chcete smazat tuto položku?</p>
    <div class="confirm-actions">
      <button class="btn-keep" onclick="closeConfirm()">Ponechat</button>
      <button class="btn-del" onclick="confirmDelete()">Smazat</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SURL='https://rcnwldvkhwcygetpeccd.supabase.co';
const KEY='sb_publishable_NDI_ONvoikguaj7fTfdn_w_8G51cWrK';
const USERS={radek:'Radek',vasek:'Vašek',karel:'Karel'};
const TABS=['ukoly','pripominky','honorar'];
const TLABELS={ukoly:'Úkoly',pripominky:'Připomínky',honorar:'Honorář'};
const MONTHS=['led','úno','bře','dub','kvě','čvn','čvc','srp','zář','říj','lis','pro'];

let user=null,tab='ukoly',assignee='radek',dueDate=null,urgent=false,tasks=[];
let editId=null,editAssignee='radek',editDueDate=null,editUrgent=false;
let editRemId=null,editHonId=null,editHonWho='karel';
let honWho='karel',deleteId=null;

function loginAs(u) {
  user=u; localStorage.setItem('u',u);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tbAv').textContent=u[0].toUpperCase();
  document.getElementById('tbAv').className='tba '+u;
  document.getElementById('tbName').textContent=USERS[u];
  setAssignee(u);
  loadTasks();
}
function switchUser() {
  localStorage.removeItem('u'); user=null;
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

function setTab(t) {
  tab=t;
  TABS.forEach((v,i)=>document.querySelectorAll('.tab')[i].classList.toggle('active',v===t));
  document.getElementById('tbTitle').textContent=TLABELS[t];
  document.getElementById('taskForm').style.display=t==='ukoly'?'block':'none';
  document.getElementById('remForm').style.display=t==='pripominky'?'block':'none';
  document.getElementById('honForm').style.display=t==='honorar'?'block':'none';
  render();
}

function setAssignee(u){assignee=u;['radek','vasek','karel'].forEach(x=>document.getElementById('ab-'+x).classList.toggle('sel',x===u));}
function setEditAssignee(u){editAssignee=u;['radek','vasek','karel'].forEach(x=>document.getElementById('eab-'+x).classList.toggle('sel',x===u));}
function setHonWho(u){honWho=u;['vasek','karel'].forEach(x=>document.getElementById('hab-'+x).classList.toggle('sel',x===u));}
function setEditHonWho(u){editHonWho=u;['vasek','karel'].forEach(x=>document.getElementById('ehab-'+x).classList.toggle('sel',x===u));}

function openDate(){const el=document.getElementById('dateInput');try{el.showPicker();}catch(e){el.click();}}
function onDateChange(v){
  dueDate=v||null;
  const lbl=document.getElementById('dateLabel'),btn=document.getElementById('dateBtnShow');
  if(v){lbl.textContent=fmtShort(v);btn.classList.add('has-date');}
  else{lbl.textContent='Datum splnění';btn.classList.remove('has-date');}
}
function toggleUrgent(){urgent=!urgent;document.getElementById('urgentBtn').classList.toggle('on',urgent);document.getElementById('urgentLabel').textContent=urgent?'Urgentní!':'Urgentní';}
function openEditDate(){const el=document.getElementById('editDateInput');try{el.showPicker();}catch(e){el.click();}}
function onEditDateChange(v){
  editDueDate=v||null;
  const lbl=document.getElementById('editDateLabel'),btn=document.getElementById('editDateBtn');
  if(v){lbl.textContent=fmtShort(v);btn.classList.add('has-date');}
  else{lbl.textContent='Datum splnění';btn.classList.remove('has-date');}
}
function toggleEditUrgent(){editUrgent=!editUrgent;document.getElementById('editUrgentBtn').classList.toggle('on',editUrgent);document.getElementById('editUrgentLabel').textContent=editUrgent?'Urgentní!':'Urgentní';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}}
function handleRemKey(e){if(e.key==='Enter'){e.preventDefault();addReminder();}}
function handleHonKey(e){if(e.key==='Enter'){e.preventDefault();addHonorar();}}

async function api(method,path,body){
  const r=await fetch(SURL+'/rest/v1/'+path,{method,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error(await r.text());
  if(r.status===204) return null;
  return r.json();
}

async function loadTasks(){
  try{tasks=await api('GET','ukoly?order=created_at.desc');render();}
  catch(e){document.getElementById('taskList').innerHTML='<div class="empty">Chyba při načítání</div>';}
}

async function addTask(){
  const text=document.getElementById('newTask').value.trim(); if(!text) return;
  const btn=document.getElementById('addBtn'); btn.disabled=true;
  try{
    const p={text,kategorie:tab,autor:user,pro:assignee,urgentni:urgent};
    if(dueDate) p.due_date=dueDate;
    const [t]=await api('POST','ukoly',p); tasks.unshift(t);
    document.getElementById('newTask').value=''; dueDate=null; urgent=false;
    document.getElementById('dateInput').value=''; onDateChange('');
    document.getElementById('urgentBtn').classList.remove('on'); document.getElementById('urgentLabel').textContent='Urgentní';
    btn.classList.add('ok'); btn.textContent='✓ Přidáno';
    setTimeout(()=>{btn.classList.remove('ok');btn.textContent='+ Přidat';},1500);
    toast('✓ Přidáno'); render();
  }catch(e){alert('Chyba: '+e.message);}
  btn.disabled=false;
}

async function addReminder(){
  const text=document.getElementById('newRem').value.trim();
  const date=document.getElementById('remDate').value;
  const time=document.getElementById('remTime').value;
  if(!text||!date){toast('Vyplňte název a datum');return;}
  const btn=document.getElementById('addRemBtn'); btn.disabled=true;
  try{
    const p={text,kategorie:'pripominky',autor:user,pro:user,due_date:date};
    if(time) p.cas=time;
    const [t]=await api('POST','ukoly',p); tasks.unshift(t);
    document.getElementById('newRem').value=''; document.getElementById('remDate').value=''; document.getElementById('remTime').value='';
    btn.classList.add('ok'); btn.textContent='✓ Přidáno';
    setTimeout(()=>{btn.classList.remove('ok');btn.textContent='+ Přidat';},1500);
    toast('✓ Připomínka přidána'); render();
  }catch(e){alert('Chyba: '+e.message);}
  btn.disabled=false;
}

async function addHonorar(){
  const text=document.getElementById('newHonDesc').value.trim();
  const date=document.getElementById('honDate').value;
  const hours=parseFloat(document.getElementById('honHours').value);
  if(!text||!date||!hours){toast('Vyplňte popis, datum a hodiny');return;}
  const btn=document.getElementById('addHonBtn'); btn.disabled=true;
  try{
    const p={text,kategorie:'honorar',autor:user,pro:honWho,due_date:date,hodiny:hours,proplaceno:false};
    const [t]=await api('POST','ukoly',p); tasks.unshift(t);
    document.getElementById('newHonDesc').value=''; document.getElementById('honDate').value=''; document.getElementById('honHours').value='';
    btn.classList.add('ok'); btn.textContent='✓ Přidáno';
    setTimeout(()=>{btn.classList.remove('ok');btn.textContent='+ Přidat';},1500);
    toast('✓ Honorář přidán'); render();
  }catch(e){alert('Chyba: '+e.message);}
  btn.disabled=false;
}

async function toggleDone(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.hotovo=!t.hotovo; render();
  try{await api('PATCH','ukoly?id=eq.'+id,{hotovo:t.hotovo});}
  catch(e){t.hotovo=!t.hotovo;render();}
}

async function toggleProplaceno(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.proplaceno=!t.proplaceno; render();
  try{await api('PATCH','ukoly?id=eq.'+id,{proplaceno:t.proplaceno});toast(t.proplaceno?'✓ Označeno jako proplaceno':'Označeno jako neproplaceno');}
  catch(e){t.proplaceno=!t.proplaceno;render();}
}

function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editId=id; editAssignee=t.pro||t.autor||'radek'; editDueDate=t.due_date||null; editUrgent=t.urgentni||false;
  document.getElementById('editText').value=t.text;
  setEditAssignee(editAssignee);
  document.getElementById('editDateInput').value=editDueDate||''; onEditDateChange(editDueDate||'');
  document.getElementById('editUrgentBtn').classList.toggle('on',editUrgent);
  document.getElementById('editUrgentLabel').textContent=editUrgent?'Urgentní!':'Urgentní';
  document.getElementById('editModal').classList.add('open');
}
function closeEdit(){document.getElementById('editModal').classList.remove('open');editId=null;}
async function saveEdit(){
  const text=document.getElementById('editText').value.trim(); if(!text) return;
  try{
    await api('PATCH','ukoly?id=eq.'+editId,{text,pro:editAssignee,urgentni:editUrgent,due_date:editDueDate||null});
    const t=tasks.find(x=>x.id===editId);
    if(t){t.text=text;t.pro=editAssignee;t.urgentni=editUrgent;t.due_date=editDueDate;}
    closeEdit(); toast('✓ Uloženo'); render();
  }catch(e){alert('Chyba: '+e.message);}
}

function openEditRem(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editRemId=id;
  document.getElementById('editRemText').value=t.text;
  document.getElementById('editRemDate').value=t.due_date||'';
  document.getElementById('editRemTime').value=t.cas||'';
  document.getElementById('editRemModal').classList.add('open');
}
function closeEditRem(){document.getElementById('editRemModal').classList.remove('open');editRemId=null;}
async function saveEditRem(){
  const text=document.getElementById('editRemText').value.trim();
  const date=document.getElementById('editRemDate').value;
  const time=document.getElementById('editRemTime').value;
  if(!text||!date) return;
  try{
    await api('PATCH','ukoly?id=eq.'+editRemId,{text,due_date:date,cas:time||null});
    const t=tasks.find(x=>x.id===editRemId);
    if(t){t.text=text;t.due_date=date;t.cas=time||null;}
    closeEditRem(); toast('✓ Uloženo'); render();
  }catch(e){alert('Chyba: '+e.message);}
}

function openEditHon(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editHonId=id; editHonWho=t.pro||'karel';
  document.getElementById('editHonText').value=t.text;
  document.getElementById('editHonDate').value=t.due_date||'';
  document.getElementById('editHonHours').value=t.hodiny||'';
  setEditHonWho(editHonWho);
  document.getElementById('editHonModal').classList.add('open');
}
function closeEditHon(){document.getElementById('editHonModal').classList.remove('open');editHonId=null;}
async function saveEditHon(){
  const text=document.getElementById('editHonText').value.trim();
  const date=document.getElementById('editHonDate').value;
  const hours=parseFloat(document.getElementById('editHonHours').value);
  if(!text||!date||!hours) return;
  try{
    await api('PATCH','ukoly?id=eq.'+editHonId,{text,due_date:date,hodiny:hours,pro:editHonWho});
    const t=tasks.find(x=>x.id===editHonId);
    if(t){t.text=text;t.due_date=date;t.hodiny=hours;t.pro=editHonWho;}
    closeEditHon(); toast('✓ Uloženo'); render();
  }catch(e){alert('Chyba: '+e.message);}
}

function askDelete(id){deleteId=id;document.getElementById('confirmModal').classList.add('open');}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('open');deleteId=null;}
async function confirmDelete(){
  if(!deleteId) return;
  const id=deleteId; closeConfirm();
  tasks=tasks.filter(x=>x.id!==id); render();
  try{await api('DELETE','ukoly?id=eq.'+id);toast('Smazáno');}
  catch(e){loadTasks();}
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

function fmtShort(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.getDate()+'. '+(d.getMonth()+1)+'. '+d.getFullYear();}
function fmtDue(s){
  if(!s) return null;
  const d=new Date(s+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
  const diff=Math.floor((d-now)/86400000);
  return{lbl:(diff<0?'Prošlé: ':'Do: ')+fmtShort(s),late:diff<0};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateCounts(){
  TABS.forEach(t=>{
    let n;
    if(t==='honorar') n=tasks.filter(x=>x.kategorie===t&&!x.proplaceno).length;
    else n=tasks.filter(x=>x.kategorie===t&&!x.hotovo).length;
    const el=document.getElementById('cnt-'+t); if(el) el.textContent=n;
  });
}

function render(){
  updateCounts();
  if(tab==='pripominky'){renderReminders();return;}
  if(tab==='honorar'){renderHonorar();return;}
  const filtered=tasks.filter(t=>t.kategorie===tab);
  const active=filtered.filter(t=>!t.hotovo);
  const done=filtered.filter(t=>t.hotovo);
  if(!filtered.length){document.getElementById('taskList').innerHTML='<div class="empty">Zatím nic</div>';return;}
  let html=taskCards(active);
  if(done.length) html+='<div class="sec-header" style="margin-top:16px"><span class="sec-title">Hotovo</span><span class="sec-count">'+done.length+'</span></div>'+taskCards(done);
  document.getElementById('taskList').innerHTML=html;
}

function renderReminders(){
  const now=new Date();now.setHours(0,0,0,0);
  const rems=tasks.filter(t=>t.kategorie==='pripominky');
  if(!rems.length){document.getElementById('taskList').innerHTML='<div class="empty">Zatím žádné připomínky</div>';return;}
  const upcoming=rems.filter(r=>r.due_date&&new Date(r.due_date+'T00:00:00')>=now).sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
  const past=rems.filter(r=>!r.due_date||new Date(r.due_date+'T00:00:00')<now).sort((a,b)=>new Date(b.due_date||b.created_at)-new Date(a.due_date||a.created_at));
  let html='';
  if(upcoming.length) html+=upcoming.map(r=>remCard(r,false)).join('');
  if(past.length) html+='<div class="sec-header" style="margin-top:16px"><span class="sec-title">Minulé</span><span class="sec-count">'+past.length+'</span></div>'+past.map(r=>remCard(r,true)).join('');
  document.getElementById('taskList').innerHTML=html;
}

function renderHonorar(){
  const hons=tasks.filter(t=>t.kategorie==='honorar').sort((a,b)=>new Date(b.due_date||b.created_at)-new Date(a.due_date||a.created_at));
  if(!hons.length){document.getElementById('taskList').innerHTML='<div class="empty">Zatím žádné záznamy</div>';return;}

  const neproplaceno=hons.filter(h=>!h.proplaceno);
  const proplaceno=hons.filter(h=>h.proplaceno);
  const totalNep=neproplaceno.reduce((s,h)=>s+(parseFloat(h.hodiny)||0),0);
  const totalPro=proplaceno.reduce((s,h)=>s+(parseFloat(h.hodiny)||0),0);

  let html=`<div class="hon-summary">
    <div class="hon-sum-item"><div class="hon-sum-label">Neproplaceno</div><div class="hon-sum-val red">${totalNep % 1 === 0 ? totalNep : totalNep.toFixed(1)} h</div></div>
    <div class="hon-sum-sep"></div>
    <div class="hon-sum-item"><div class="hon-sum-label">Proplaceno</div><div class="hon-sum-val green">${totalPro % 1 === 0 ? totalPro : totalPro.toFixed(1)} h</div></div>
    <div class="hon-sum-sep"></div>
    <div class="hon-sum-item"><div class="hon-sum-label">Celkem</div><div class="hon-sum-val">${(totalNep+totalPro) % 1 === 0 ? (totalNep+totalPro) : (totalNep+totalPro).toFixed(1)} h</div></div>
  </div>`;

  if(neproplaceno.length){
    html+='<div class="sec-header"><span class="sec-title">Neproplaceno</span><span class="sec-count">'+neproplaceno.length+'</span></div>';
    html+=neproplaceno.map(h=>honCard(h)).join('');
  }
  if(proplaceno.length){
    html+='<div class="sec-header" style="margin-top:16px"><span class="sec-title">Proplaceno</span><span class="sec-count">'+proplaceno.length+'</span></div>';
    html+=proplaceno.map(h=>honCard(h)).join('');
  }
  document.getElementById('taskList').innerHTML=html;
}

function remCard(t,isPast){
  const d=t.due_date?new Date(t.due_date+'T00:00:00'):null;
  const day=d?d.getDate():'?';
  const month=d?MONTHS[d.getMonth()]:'';
  const timeStr=t.cas?t.cas.slice(0,5):'';
  return`<div class="rem-card ${isPast?'past':''}">
    <div class="rem-date-block"><div class="rem-day">${day}</div><div class="rem-month">${month}</div></div>
    <div class="rem-body">
      <div class="rem-title">${esc(t.text)}</div>
      ${timeStr?`<div class="rem-time-tag">🕐 ${timeStr}</div>`:''}
      ${isPast?`<span class="rem-past-tag">Minulé</span>`:''}
    </div>
    <div class="card-actions">
      <button class="action-btn" onclick="openEditRem(${t.id})">✏️</button>
      <button class="action-btn del" onclick="askDelete(${t.id})">🗑️</button>
    </div>
  </div>`;
}

function honCard(t){
  const pro=t.pro||'karel';
  const proName=USERS[pro]||pro;
  const isPro=t.proplaceno;
  const h=parseFloat(t.hodiny)||0;
  const hStr=h%1===0?h:h.toFixed(1);
  return`<div class="hon-card ${isPro?'proplaceno':'neproplaceno'}">
    <button class="hon-status-btn" onclick="toggleProplaceno(${t.id})" title="${isPro?'Označit jako neproplaceno':'Označit jako proplaceno'}">
      <div class="hon-status-icon">${isPro?'✓':'!'}</div>
      <div class="hon-status-label">${isPro?'proplaceno':'čeká'}</div>
    </button>
    <div class="hon-body">
      <div class="hon-title">${esc(t.text)}</div>
      <div class="hon-meta">
        <span class="hon-who ${pro}">${esc(proName)}</span>
        ${t.due_date?`<span class="hon-date">${fmtShort(t.due_date)}</span>`:''}
      </div>
    </div>
    <div class="hon-hours">${hStr} h</div>
    <div class="card-actions">
      <button class="action-btn" onclick="openEditHon(${t.id})">✏️</button>
      <button class="action-btn del" onclick="askDelete(${t.id})">🗑️</button>
    </div>
  </div>`;
}

function taskCards(items){
  return items.map(t=>{
    const pro=t.pro||t.autor||'radek';
    const proName=USERS[pro]||pro;
    const due=fmtDue(t.due_date);
    const isUrg=t.urgentni&&!t.hotovo;
    return`<div class="card ${t.hotovo?'done':''} ${isUrg?'urgent':''}">
      <div class="cb ${t.hotovo?'chk':''}" onclick="toggleDone(${t.id})"></div>
      <div class="card-body">
        <div class="card-text">${esc(t.text)}</div>
        <div class="card-foot">
          <div class="card-tags">
            ${due?`<span class="due-tag ${due.late?'late':''}">${esc(due.lbl)}</span>`:''}
            ${isUrg?`<span class="urg-tag">🔴 Urgentní</span>`:''}
          </div>
          <div class="pro-badge ${pro}"><div class="pro-dot"></div>${esc(proName)}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn" onclick="openEdit(${t.id})">✏️</button>
        <button class="action-btn del" onclick="askDelete(${t.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

window.onload=function(){const saved=localStorage.getItem('u');if(saved&&USERS[saved])loginAs(saved);};
setInterval(loadTasks,30000);
</script>
</body>
</html>
